<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>React Router SSG 빌드 파이프라인</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #f5f7fb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    color: #1e293b;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  h1 {
    text-align: center;
    font-size: 24px;
    margin: 0 0 8px 0;
    color: #0f172a;
  }
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 14px;
    margin-bottom: 32px;
  }
  svg { display: block; width: 100%; height: auto; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 24px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #475569;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .swatch { width: 16px; height: 16px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>React Router SSG 빌드 파이프라인</h1>
  <p class="subtitle">빌드 단계에서 임시 웹서버를 기동해 Prerender로 정적 HTML을 생성하는 구조</p>

  <svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
      </marker>
      <marker id="arrow-danger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
      </marker>
      <marker id="arrow-success" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
      </marker>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
      </filter>
    </defs>

    <!-- ===== Source ===== -->
    <g filter="url(#softShadow)">
      <rect x="40" y="40" width="180" height="80" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="130" y="70" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">개발자 / Git Repo</text>
      <text x="130" y="92" text-anchor="middle" font-size="12" fill="#64748b">React Router 프로젝트</text>
      <text x="130" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">(React 19 + RR v7)</text>
    </g>

    <!-- Arrow into pipeline -->
    <line x1="220" y1="80" x2="270" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- ===== Build Pipeline Container ===== -->
    <g>
      <rect x="275" y="20" width="590" height="580" rx="14" fill="#f8fafc" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4"/>
      <rect x="275" y="20" width="590" height="36" rx="14" fill="#3b82f6"/>
      <rect x="275" y="42" width="590" height="14" fill="#3b82f6"/>
      <text x="570" y="43" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">빌드 파이프라인 (CI/CD 환경)</text>
    </g>

    <!-- Step 1: Build -->
    <g filter="url(#softShadow)">
      <rect x="310" y="80" width="520" height="70" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="340" cy="115" r="16" fill="#3b82f6"/>
      <text x="340" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
      <text x="370" y="108" font-size="14" font-weight="600" fill="#0f172a">React Router 프로젝트 빌드</text>
      <text x="370" y="128" font-size="12" fill="#64748b">pnpm build → dist/ (JS/CSS 번들, 라우트 매니페스트)</text>
      <text x="370" y="144" font-size="11" fill="#94a3b8" font-family="monospace">Vite + Babel</text>
    </g>

    <!-- arrow -->
    <line x1="570" y1="155" x2="570" y2="185" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 2: Temp server -->
    <g filter="url(#softShadow)">
      <rect x="310" y="190" width="520" height="90" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
      <circle cx="340" cy="225" r="16" fill="#10b981"/>
      <text x="340" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
      <text x="370" y="218" font-size="14" font-weight="600" fill="#065f46">빌드 전용 임시 웹서버 기동</text>
      <text x="370" y="238" font-size="12" fill="#047857">빌드 산출물(dist/)을 로컬에서 정적 서빙</text>
      <text x="370" y="256" font-size="11" fill="#059669" font-family="monospace">http://localhost:4173  (예: vite preview / serve)</text>
      <text x="370" y="272" font-size="11" fill="#10b981" font-weight="600">※ 파이프라인 내부 네트워크에서만 접근</text>
    </g>

    <!-- arrow -->
    <line x1="570" y1="285" x2="570" y2="315" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 3: Prerender -->
    <g filter="url(#softShadow)">
      <rect x="310" y="320" width="520" height="110" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="340" cy="355" r="16" fill="#3b82f6"/>
      <text x="340" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
      <text x="370" y="348" font-size="14" font-weight="600" fill="#0f172a">Prerender 실행 (Headless Browser)</text>
      <text x="370" y="368" font-size="12" fill="#64748b">Playwright / Puppeteer 로 대상 URL 순회하며 렌더링 후 HTML 스냅샷</text>
      <text x="370" y="386" font-size="11" fill="#94a3b8" font-family="monospace">target: localhost:4173/page-a, /page-b, /slug/...</text>
      
      <!-- mini flow inside -->
      <rect x="370" y="398" width="440" height="24" rx="4" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="382" y="414" font-size="11" fill="#1e40af">요청 → 페이지 로드 완료 대기 → document.documentElement.outerHTML 추출</text>
    </g>

    <!-- arrow -->
    <line x1="570" y1="435" x2="570" y2="465" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 4: HTML output -->
    <g filter="url(#softShadow)">
      <rect x="310" y="470" width="520" height="70" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="340" cy="505" r="16" fill="#3b82f6"/>
      <text x="340" y="510" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
      <text x="370" y="498" font-size="14" font-weight="600" fill="#0f172a">정적 HTML 산출물 생성</text>
      <text x="370" y="518" font-size="12" fill="#64748b">dist/ + /page-a/index.html, /page-b/index.html ...</text>
      <text x="370" y="534" font-size="11" fill="#94a3b8">SEO / 초기 렌더 성능용 pre-rendered HTML</text>
    </g>

    <!-- arrow to shutdown -->
    <line x1="570" y1="545" x2="570" y2="565" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- shutdown note -->
    <g>
      <rect x="380" y="565" width="380" height="24" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="570" y="581" text-anchor="middle" font-size="11" fill="#92400e">임시 웹서버 종료 후 배포 아티팩트만 다음 단계로 전달</text>
    </g>

    <!-- ===== Deploy arrow ===== -->
    <line x1="865" y1="505" x2="920" y2="505" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-success)"/>
    <text x="892" y="496" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">배포</text>

    <!-- ===== Production ===== -->
    <g filter="url(#softShadow)">
      <rect x="920" y="460" width="160" height="90" rx="10" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
      <text x="1000" y="485" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">운영 WAS / CDN</text>
      <text x="1000" y="505" text-anchor="middle" font-size="11" fill="#64748b">실 서비스 환경</text>
      <line x1="940" y1="515" x2="1060" y2="515" stroke="#e2e8f0"/>
      <text x="1000" y="532" text-anchor="middle" font-size="11" fill="#64748b">m.kbanknow.com</text>
    </g>

    <!-- ===== 🔴 핵심 제약 강조 ===== -->
    <!-- Danger block at top-right -->
    <g filter="url(#softShadow)">
      <rect x="900" y="40" width="180" height="200" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
      <rect x="900" y="40" width="180" height="32" rx="12" fill="#dc2626"/>
      <rect x="900" y="60" width="180" height="12" fill="#dc2626"/>
      <text x="990" y="61" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">⚠ 핵심 제약사항</text>

      <text x="990" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">빌드 단계에서</text>
      <text x="990" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">운영 WAS 접근 금지</text>

      <line x1="920" y1="125" x2="1060" y2="125" stroke="#fecaca"/>

      <text x="990" y="146" text-anchor="middle" font-size="11" fill="#7f1d1d">Prerender 타겟은</text>
      <text x="990" y="162" text-anchor="middle" font-size="11" fill="#7f1d1d">반드시 로컬 임시 서버</text>

      <text x="990" y="186" text-anchor="middle" font-size="11" fill="#7f1d1d">운영 URL·운영 API</text>
      <text x="990" y="202" text-anchor="middle" font-size="11" fill="#7f1d1d">직접 호출 전면 차단</text>

      <text x="990" y="226" text-anchor="middle" font-size="10" fill="#b91c1c" font-style="italic">(보안·컴플라이언스 요건)</text>
    </g>

    <!-- Blocked arrow: Prerender ---X---> Production -->
    <g>
      <!-- path -->
      <path d="M 830 375 Q 890 375 920 450" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
      <!-- Big X -->
      <circle cx="885" cy="395" r="18" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
      <line x1="874" y1="384" x2="896" y2="406" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
      <line x1="896" y1="384" x2="874" y2="406" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
      <text x="885" y="435" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">차단</text>
    </g>

    <!-- ===== Bottom callout ===== -->
    <g>
      <rect x="40" y="640" width="1040" height="90" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="60" y="668" font-size="13" font-weight="700" fill="#92400e">왜 별도 빌드 웹서버가 필요한가?</text>
      <text x="60" y="690" font-size="12" fill="#78350f">• React Router(SPA)는 런타임에 JS로 라우팅 → HTML을 뽑으려면 실제로 브라우저가 페이지를 렌더해야 함</text>
      <text x="60" y="708" font-size="12" fill="#78350f">• 운영 WAS 접근이 금지되어 있으므로, 빌드 산출물을 로컬에 서빙할 전용 웹서버가 반드시 필요</text>
      <text x="60" y="726" font-size="12" fill="#78350f">• 임시 서버는 빌드 파이프라인 수명과 동일 — Prerender 종료 시 함께 종료되어 외부 노출 없음</text>
    </g>
  </svg>

  <div class="legend">
    <div class="legend-item"><div class="swatch" style="background:#3b82f6"></div>빌드 단계</div>
    <div class="legend-item"><div class="swatch" style="background:#10b981"></div>임시 웹서버</div>
    <div class="legend-item"><div class="swatch" style="background:#059669"></div>허용 흐름</div>
    <div class="legend-item"><div class="swatch" style="background:#dc2626"></div>차단 흐름 / 제약</div>
    <div class="legend-item"><div class="swatch" style="background:#f59e0b"></div>부가 설명</div>
  </div>
</div>
</body>
</html>
